<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="senbon">
  <!--
    An enso: the zen circle, left deliberately open. Detail dies at 16px, so
    this is one heavy stroke and nothing else — a mark, not a drawing.

    Colours are the real tokens (--primary and --background), inlined because
    an SVG loaded as a favicon has no access to the page's stylesheet. The
    media query is honoured by the browser chrome, so the tab icon follows the
    OS theme the same way the site does.
  -->
  <style>
    .plate { fill: #fbf5ec; }
    .ring { stroke: #a8455c; }

    @media (prefers-color-scheme: dark) {
      .plate { fill: #211a15; }
      .ring { stroke: #f0919f; }
    }
  </style>

  <rect class="plate" width="32" height="32" rx="7" />
  <circle
    class="ring"
    cx="16"
    cy="16"
    r="9"
    fill="none"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-dasharray="47 10"
    transform="rotate(-50 16 16)"
  />
</svg>
