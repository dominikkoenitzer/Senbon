<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="senbon">
  <style>
    .plate { fill: #a8455c; }
    .petal { fill: #fbf5ec; }
    .eye { fill: #a8455c; }

    @media (prefers-color-scheme: dark) {
      .plate { fill: #f0919f; }
      .petal { fill: #2b1a12; }
      .eye { fill: #f0919f; }
    }
  </style>

  <rect class="plate" width="32" height="32" rx="8" fill="#a8455c" />

  <g class="petal" fill="#fbf5ec">
    <circle cx="16" cy="9" r="4.35" />
    <circle cx="22.66" cy="13.84" r="4.35" />
    <circle cx="20.11" cy="21.66" r="4.35" />
    <circle cx="11.89" cy="21.66" r="4.35" />
    <circle cx="9.34" cy="13.84" r="4.35" />
  </g>

  <circle class="eye" cx="16" cy="16" r="2" fill="#a8455c" />
</svg>
