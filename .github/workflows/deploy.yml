name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

# Never cancel an in-flight production deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  vercel:
    name: Production deploy (Vercel)
    runs-on: ubuntu-latest

    # Secrets are mapped to env so the guard step can detect whether deployment
    # is configured. With no secrets set, this job is a green no-op — Senbon
    # otherwise deploys automatically through Vercel's Git integration.
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check for Vercel credentials
        id: guard
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not configured — skipping CLI deploy. Add VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID to enable it."
          fi

      - name: Checkout
        if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.guard.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build project
        if: steps.guard.outputs.ready == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        if: steps.guard.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
